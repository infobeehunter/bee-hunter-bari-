<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BeeHunter Bari - Live App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
        #map-container { height: 100%; width: 100%; }
        /* Stile per il Pin del Giocatore */
        .player-pin { background-color: #F5C518; border: 3px solid white; rounded: 50%; width: 20px; height: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-24 overflow-x-hidden">

    <header class="bg-white p-5 shadow-sm sticky top-0 z-50 flex justify-between items-center border-b border-gray-100">
        <h1 class="text-xl font-black text-yellow-500 tracking-tighter">BEEHUNTER 🐝</h1>
        <div class="bg-yellow-100 px-4 py-1 rounded-full border border-yellow-200">
            <span class="font-bold text-yellow-700">150 pt</span>
        </div>
    </header>

    <main id="home" class="page active p-5 space-y-4 relative z-10">
        <h2 class="text-2xl font-black mb-1">Sfide Vicino a Te 👋</h2>
        <p class="text-gray-400 text-sm mb-6">Clicca su una sfida per vedere i dettagli.</p>
        
        <button onclick="showDetails('barca')" class="w-full text-left bg-white p-5 rounded-3xl shadow-sm border border-gray-100 border-b-4 border-blue-500 card active:scale-95 transition-transform">
            <div class="flex justify-between items-start mb-3">
                <span class="bg-blue-100 text-blue-600 text-[10px] font-black px-2 py-1 rounded">MARE</span>
                <span class="text-green-500 font-bold">+50pt</span>
            </div>
            <h3 class="text-lg font-black italic uppercase">Tour in Barca</h3>
            <p class="text-gray-500 text-xs mt-1 leading-relaxed">Trova il QR Code nascosto al porto storico di Bari.</p>
        </button>

        <button onclick="showDetails('orecchietta')" class="w-full text-left bg-white p-5 rounded-3xl shadow-sm border border-gray-100 border-b-4 border-yellow-500 card active:scale-95 transition-transform">
            <div class="flex justify-between items-start mb-3">
                <span class="bg-yellow-100 text-yellow-600 text-[10px] font-black px-2 py-1 rounded">CIBO</span>
                <span class="text-green-500 font-bold">+60pt</span>
            </div>
            <h3 class="text-lg font-black italic uppercase">Mani in Pasta</h3>
            <p class="text-gray-500 text-xs mt-1 leading-relaxed">Impara a fare le orecchiette a Bari Vecchia.</p>
        </button>
    </main>

    <main id="map" class="page h-[calc(100vh-140px)] p-0 relative z-10">
        <div id="map-container"></div>
    </main>

    <main id="camera" class="page p-5 text-center relative z-10">
        <h2 class="text-2xl font-black mb-4">Scansiona QR Code 📸</h2>
        <p class="text-gray-500 text-sm mb-6">Inquadra il codice per completare la sfida.</p>
        
        <div class="relative w-full h-80 bg-black rounded-3xl overflow-hidden shadow-2xl border-4 border-white mx-auto max-w-sm">
            <video id="webcam" autoplay playsinline class="w-full h-full object-cover"></video>
            <div class="absolute inset-0 border-4 border-dashed border-yellow-400 rounded-3xl m-10 opacity-60"></div>
        </div>
        
        <button onclick="startCamera()" class="mt-6 bg-yellow-400 text-white px-6 py-3 rounded-2xl font-bold shadow-md">ATTIVA FOTOCAMERA</button>
    </main>

    <main id="leaderboard" class="page p-5 relative z-10">
        <h2 class="text-2xl font-black mb-6 italic text-yellow-500 uppercase text-center">Classifica 🐝</h2>
        <div class="space-y-3 max-w-md mx-auto">
            <div class="bg-yellow-400 text-white p-5 rounded-2xl flex justify-between items-center font-black shadow-lg border-2 border-white">
                <span>1. Tu (Mario_BA)</span> <span>150 pt</span>
            </div>
            <div class="bg-white p-5 rounded-2xl flex justify-between items-center font-bold text-gray-400 border border-gray-100 shadow-sm">
                <span>2. Luca_Esplora</span> <span>120 pt</span>
            </div>
        </div>
    </main>

    <main id="details" class="page p-5 relative z-10">
        <button onclick="showPage('home')" class="text-blue-500 mb-6 font-bold flex items-center">⬅ Torna alle Sfide</button>
        <div id="details-content" class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
            </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around items-center z-40 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
        <button onclick="showPage('home')" class="flex flex-col items-center text-gray-400 nav-btn" id="btn-home">
            <span class="text-xl">🏠</span>
            <span class="text-[9px] font-black mt-1">HOME</span>
        </button>
        <button onclick="showPage('map')" class="flex flex-col items-center text-gray-400 nav-btn" id="btn-map">
            <span class="text-xl">📍</span>
            <span class="text-[9px] font-black mt-1">MAPPA</span>
        </button>
        <button onclick="showPage('camera')" class="bg-yellow-400 p-4 rounded-full -mt-12 border-8 border-gray-50 shadow-xl text-white active:scale-90 transition-transform nav-btn" id="btn-camera">
            <span class="text-2xl">📸</span>
        </button>
        <button onclick="showPage('leaderboard')" class="flex flex-col items-center text-gray-400 nav-btn" id="btn-leaderboard">
            <span class="text-xl">🏆</span>
            <span class="text-[9px] font-black mt-1">RANK</span>
        </button>
    </nav>

    <script>
        // --- GESTIONE PAGINE ---
        function showPage(pageId) {
            // Nasconde tutte le pagine
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // Mostra quella selezionata
            document.getElementById(pageId).classList.add('active');
            
            // Gestione Mappa (inizializza solo quando serve)
            if (pageId === 'map') { initMap(); }
            // Gestione Fotocamera (Ferma se cambi pagina)
            if (pageId !== 'camera') { stopCamera(); }

            // Aggiorna colore icone nav
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('text-yellow-500'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-gray-400'));
            document.getElementById('btn-'+pageId).classList.remove('text-gray-400');
            document.getElementById('btn-'+pageId).classList.add('text-yellow-500');
            
            window.scrollTo(0,0);
        }

        // --- GESTIONE DETTAGLI SFIDA ---
        const sfidaData = {
            'barca': {
                title: '⚓ Tour in Barca Levante',
                category: 'MARE',
                points: '+50pt',
                color: 'blue',
                desc: 'Benvenuto al Porto Storico di Bari! La tua missione è trovare la targa commemorativa vicino al molo principale. Lì vicino, nascosto dietro un palo della luce, troverai il QR Code per sbloccare il badge "Capitano del Levante" e guadagnare i tuoi punti. Buona caccia!',
                img: '🚢'
            },
            'orecchietta': {
                title: '🍝 Mani in Pasta',
                category: 'CIBO',
                points: '+60pt',
                color: 'yellow',
                desc: 'Recati nel cuore di Bari Vecchia, in via delle Orecchiette. Trova la signora Maria (la riconosci dal grembiule a fiori). Partecipa alla sua breve lezione e, alla fine, ti mostrerà il QR Code per sbloccare il badge "Orecchietta Master". Preparati a impastare!',
                img: '👩‍🍳'
            }
        };

        function showDetails(sfidaId) {
            const data = sfidaData[sfidaId];
            const content = `
                <div class="text-6xl mb-4">${data.img}</div>
                <div class="flex justify-between items-start mb-3">
                    <span class="bg-${data.color}-100 text-${data.color}-600 text-[10px] font-black px-2 py-1 rounded">${data.category}</span>
                    <span class="text-green-500 font-bold">${data.points}</span>
                </div>
                <h3 class="text-2xl font-black uppercase italic mb-4">${data.title}</h3>
                <p class="text-gray-600 text-sm leading-relaxed mb-6">${data.desc}</p>
                <button onclick="showPage('camera')" class="w-full bg-yellow-400 text-white py-3 rounded-2xl font-bold shadow-md text-yellow-900">APRI SCANNER QR</button>
            `;
            document.getElementById('details-content').innerHTML = content;
            showPage('details');
        }

        // --- GESTIONE MAPPA REALE (LEAFLET) ---
        let map;
        function initMap() {
            if (map) return; // Non reinizializzare se esiste già

            // Imposta la mappa su Bari (Lat, Lon, Zoom)
            map = L.map('map-container').setView([41.1259, 16.8661], 14);

            // Carica le piastrelle della mappa (OpenStreetMap)
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            // Tenta di ottenere il GPS reale
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    // Centra la mappa sull'utente
                    map.setView([lat, lon], 16);

                    // Aggiunge un Pin personalizzato per il giocatore
                    const playerIcon = L.divIcon({className: 'player-pin'});
                    L.marker([lat, lon], {icon: playerIcon}).addTo(map).bindPopup("<b>Tu sei qui!</b><br>Cerca le api vicine.").openPopup();
                }, error => {
                    alert("Impossibile ottenere la tua posizione GPS. Assicurati che il GPS sia attivo e di aver dato il permesso al browser.");
                });
            } else {
                alert("Il tuo browser non supporta la geolocalizzazione.");
            }

            // Aggiunge Pin delle sfide (simulati su Bari)
            L.marker([41.1305, 16.8745]).addTo(map).bindPopup("<b>⚓ Tour in Barca</b><br>Punti: +50pt");
            L.marker([41.1275, 16.8690]).addTo(map).bindPopup("<b>🍝 Mani in Pasta</b><br>Punti: +60pt");
        }

        // --- GESTIONE FOTOCAMERA (WEBCAM) ---
        let videoStream;
        const videoElement = document.getElementById('webcam');

        async function startCamera() {
            try {
                // Richiede il permesso per la fotocamera posteriore (environment)
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                videoElement.srcObject = videoStream;
                document.querySelector('#camera button').innerText = "FOTOCAMERA ATTIVA";
                document.querySelector('#camera button').classList.add('bg-green-500');
            } catch (error) {
                alert("Impossibile accedere alla fotocamera. Assicurati di aver dato il permesso al browser e che nessun'altra app la stia usando.");
                console.error("Errore Camera:", error);
            }
        }

        function stopCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoElement.srcObject = null;
                // Ripristina tasto
                document.querySelector('#camera button').innerText = "ATTIVA FOTOCAMERA";
                document.querySelector('#camera button').classList.remove('bg-green-500');
            }
        }
    </script>
</body>
</html>
