<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BeeHunter Bari | Official Experience</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap');
        :root { --bee-yellow: #FFD200; --bari-blue: #0056b3; --soft-bg: #F1F5F9; --dark-slate: #0F172A; }
        body { font-family: 'Outfit', sans-serif; background: var(--soft-bg); color: var(--dark-slate); overflow: hidden; height: 100vh; }
        
        .glass-header { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.1); position: fixed; top:0; width:100%; z-index: 1000; padding: 15px 20px; }
        .bottom-nav { background: white; border-top: 1px solid #e2e8f0; position: fixed; bottom: 0; width: 100%; height: 70px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 700; color: #94a3b8; transition: 0.3s; }
        .nav-item.active { color: var(--bari-blue); }
        
        .page { display: none; height: 100vh; overflow-y: auto; padding: 90px 20px 100px; scroll-behavior: smooth; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }

        #map { height: 300px; width: 100%; border-radius: 24px; border: 4px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .card-quest { background: white; border-radius: 20px; padding: 18px; border-left: 6px solid var(--bee-yellow); margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .rank-badge { font-size: 9px; padding: 2px 8px; border-radius: 10px; color: white; font-weight: 800; }
        
        #scanner-modal { display: none; position: fixed; inset: 0; background: black; z-index: 9999; }
        .upload-overlay { position: absolute; bottom: 50px; width: 100%; display: flex; justify-content: center; gap: 20px; }
        .btn-main { background: var(--bee-yellow); color: black; font-weight: 800; padding: 12px 24px; border-radius: 12px; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; width: 100%; }
    </style>
</head>
<body>

    <div class="glass-header flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-yellow-400 p-2 rounded-xl text-white"><i class="fa-solid fa-bee text-xl"></i></div>
            <div>
                <h1 class="font-black text-lg tracking-tighter leading-none">BEEHUNTER</h1>
                <span id="u-rank-display" class="rank-badge bg-slate-400 uppercase">Caricamento...</span>
            </div>
        </div>
        <div class="bg-slate-100 px-4 py-2 rounded-full flex items-center gap-2">
            <span class="text-xs font-black" id="total-xp">0 XP</span>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="nav('home')"><i class="fa-solid fa-map-marked-alt text-xl"></i><span>HOME</span></div>
        <div class="nav-item" onclick="nav('partners')"><i class="fa-solid fa-store text-xl"></i><span>PARTNER</span></div>
        <div class="nav-item" onclick="nav('passes')"><i class="fa-solid fa-ticket text-xl"></i><span>I MIEI PASS</span></div>
        <div class="nav-item" onclick="nav('profile')"><i class="fa-solid fa-user-circle text-xl"></i><span>IO</span></div>
    </nav>

    <main id="home" class="page active">
        <div id="map" class="mb-6"></div>
        <h3 class="font-black text-lg mb-4 uppercase tracking-tight">Obiettivi Vicini</h3>
        <div id="quests-container"></div>
    </main>

    <main id="partners" class="page">
        <h2 class="font-black text-2xl mb-2">Partner Ufficiali</h2>
        <p class="text-sm text-slate-500 mb-6">Mostra i tuoi coupon in queste attività.</p>
        <div id="partners-list" class="space-y-4">
            </div>
    </main>

    <main id="passes" class="page">
        <h2 class="font-black text-2xl mb-6 text-blue-600">I Tuoi Coupon</h2>
        <div id="active-passes" class="space-y-4"></div>
    </main>

    <main id="profile" class="page">
        <div id="auth-section">
            <div class="bg-white p-8 rounded-[40px] text-center shadow-xl">
                <h2 class="font-black text-2xl mb-4 text-blue-600">Inizia la Caccia</h2>
                <input type="text" id="reg-nome" placeholder="Il tuo nome" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none mb-4">
                <button onclick="register()" class="btn-main">Entra nel Team</button>
            </div>
        </div>
        <div id="user-dashboard" class="hidden">
            <div class="flex items-center gap-6 mb-10">
                <img id="user-img" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Bari" class="w-24 h-24 rounded-[30px] border-4 border-white shadow-lg bg-white">
                <div>
                    <h2 class="font-black text-2xl uppercase italic" id="u-name-display">Hunter</h2>
                    <p class="text-xs font-bold text-blue-500 uppercase tracking-widest" id="u-rank-text">Livello 1</p>
                </div>
            </div>
            <h3 class="font-black text-lg mb-4">I Miei Badge</h3>
            <div id="badge-container" class="grid grid-cols-3 gap-3 mb-10"></div>
            <h3 class="font-black text-lg mb-4">Foto Diario</h3>
            <div id="photo-diary" class="grid grid-cols-2 gap-3"></div>
        </div>
    </main>

    <div id="scanner-modal">
        <video id="video-preview" class="w-full h-full object-cover"></video>
        <div class="upload-overlay">
            <button onclick="closeScanner()" class="bg-white/20 p-5 rounded-full backdrop-blur-md text-white"><i class="fa-solid fa-xmark"></i></button>
            <button onclick="takeSnapshot()" class="bg-yellow-400 p-8 rounded-full shadow-2xl animate-pulse"><i class="fa-solid fa-camera text-3xl"></i></button>
        </div>
    </div>

    <script>
        /* --- CONFIGURAZIONE DATA --- */
        const RANKS = [
            { name: "Larva", minXp: 0, color: "#94A3B8" },
            { name: "Esploratore", minXp: 50, color: "#22C55E" },
            { name: "Ape Operaia", minXp: 150, color: "#EAB308" },
            { name: "Bari Master", minXp: 300, color: "#EF4444" },
            { name: "Ape Regina", minXp: 500, color: "#7C3AED" }
        ];

        const PARTNERS = [
            { name: "Panificio Fiore", category: "Forno Storico", address: "Strada Palazzo di Città, 38", img: "https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=100" },
            { name: "Mastro Ciccio", category: "Street Food", address: "Corso Vittorio Emanuele, 15", img: "https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&w=100" }
        ];

        const QUESTS = [
            { id: 1, type: 'culture', title: 'Basilica San Nicola', points: 20, lat: 41.1315, lng: 16.8722, badge: 'Culture', color: '#2563EB' },
            { id: 2, type: 'food', title: 'Arco Basso (Orecchiette)', points: 15, lat: 41.1302, lng: 16.8700, badge: 'Tradition', color: '#E11D48' },
            { id: 3, type: 'market', title: 'Nderr alla Lanz', points: 15, lat: 41.1220, lng: 16.8760, badge: 'Sea', color: '#0EA5E9' }
        ];

        let userState = JSON.parse(localStorage.getItem('beehunter_final_v1')) || {
            registered: false, name: '', xp: 0, visitedIds: [], badges: [], diary: [], passes: []
        };

        let map, currentQuestId = null;

        /* --- CORE FUNCTIONS --- */
        function init() {
            renderMap();
            updateUI();
            renderPartners();
            if(userState.registered) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('user-dashboard').classList.remove('hidden');
            }
            setInterval(checkCouponExpirations, 30000);
        }

        function renderMap() {
            map = L.map('map', { zoomControl: false }).setView([41.125, 16.872], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            QUESTS.forEach(q => {
                L.circleMarker([q.lat, q.lng], { radius: 10, color: q.color, fillOpacity: 0.8 }).addTo(map);
            });
        }

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if(id === 'home') setTimeout(() => map.invalidateSize(), 200);
            updateUI();
        }

        function register() {
            const n = document.getElementById('reg-nome').value;
            if(!n) return alert("Inserisci il tuo nome!");
            userState.registered = true; userState.name = n;
            save(); location.reload();
        }

        /* --- LOGICA PREMI & RANKING --- */
        function checkCoupons() {
            const availableRewards = [
                { id: 'c1', threshold: 50, title: "SCONTO 15% FIORE", desc: "Sulla focaccia barese" },
                { id: 'c2', threshold: 150, title: "TARALLI OMAGGIO", desc: "Con una spesa minima di 10€" }
            ];

            availableRewards.forEach(reward => {
                if(userState.xp >= reward.threshold && !userState.passes.find(p => p.id === reward.id)) {
                    userState.passes.push({
                        ...reward,
                        expiry: Date.now() + (24 * 60 * 60 * 1000),
                        dateGenerated: new Date().toLocaleDateString()
                    });
                    alert(`🌟 NUOVO COUPON SBLOCCATO: ${reward.title}`);
                }
            });
            save();
        }

        function checkCouponExpirations() {
            const now = Date.now();
            const originalCount = userState.passes.length;
            userState.passes = userState.passes.filter(p => !p.expiry || p.expiry > now);
            if(userState.passes.length !== originalCount) { save(); updateUI(); }
        }

        /* --- FOTOCAMERA E PUNTI --- */
        function startQuest(id) {
            currentQuestId = id;
            document.getElementById('scanner-modal').style.display = 'block';
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(s => { document.getElementById('video-preview').srcObject = s; document.getElementById('video-preview').play(); })
                .catch(() => alert("Accesso camera negato."));
        }

        function takeSnapshot() {
            const v = document.getElementById('video-preview');
            const c = document.createElement('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            const imgData = c.toDataURL('image/jpeg');
            
            const q = QUESTS.find(x => x.id === currentQuestId);
            userState.xp += q.points;
            userState.visitedIds.push(q.id);
            userState.diary.push({ img: imgData, title: q.title });
            if(!userState.badges.includes(q.badge)) userState.badges.push(q.badge);
            
            checkCoupons();
            save();
            closeScanner();
            updateUI();
        }

        function closeScanner() {
            const s = document.getElementById('video-preview').srcObject;
            if(s) s.getTracks().forEach(t => t.stop());
            document.getElementById('scanner-modal').style.display = 'none';
        }

        /* --- UI RENDERERS --- */
        function updateUI() {
            const rank = [...RANKS].reverse().find(r => userState.xp >= r.minXp);
            
            // Header & Profilo
            document.getElementById('total-xp').innerText = `${userState.xp} XP`;
            const rankDisplay = document.getElementById('u-rank-display');
            rankDisplay.innerText = rank.name;
            rankDisplay.style.backgroundColor = rank.color;
            
            if(userState.registered) {
                document.getElementById('u-name-display').innerText = userState.name;
                document.getElementById('u-rank-text').innerText = rank.name;
            }

            // Quests
            document.getElementById('quests-container').innerHTML = QUESTS.map(q => {
                const done = userState.visitedIds.includes(q.id);
                return `
                <div class="card-quest ${done ? 'opacity-50' : ''}">
                    <div class="flex justify-between items-start">
                        <div><h4 class="font-black">${q.title}</h4><p class="text-[10px] text-slate-400 uppercase font-bold">${q.type}</p></div>
                        <span class="font-black text-blue-600">+${q.points}XP</span>
                    </div>
                    ${!done ? `<button onclick="startQuest(${q.id})" class="mt-4 bg-slate-900 text-white w-full py-2 rounded-xl text-xs font-bold">CATTURA ORA</button>` : `<p class="text-green-500 font-black text-xs mt-2">✓ COMPLETATO</p>`}
                </div>`;
            }).join('');

            // Coupon
            const passBox = document.getElementById('active-passes');
            if(userState.passes.length === 0) {
                passBox.innerHTML = `<p class="text-center text-slate-400 py-20">Nessun coupon attivo. Guadagna XP per sbloccarli!</p>`;
            } else {
                passBox.innerHTML = userState.passes.map(p => {
                    const diff = p.expiry - Date.now();
                    const h = Math.floor(diff / 3600000);
                    const m = Math.floor((diff % 3600000) / 60000);
                    return `
                    <div class="bg-white border-2 border-blue-600 p-5 rounded-3xl relative overflow-hidden">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="font-black text-blue-600 text-lg">${p.name}</h4>
                            <span class="bg-red-500 text-white text-[8px] px-2 py-1 rounded-full animate-pulse">${h}h ${m}m</span>
                        </div>
                        <p class="text-xs text-slate-500 mb-4">${p.desc}</p>
                        <button onclick="shareSocial()" class="w-full bg-blue-50 text-blue-600 py-2 rounded-xl font-black text-[10px] uppercase border border-blue-200 mb-2">Condividi (+5 XP)</button>
                        <button class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-xs uppercase">Usa in cassa</button>
                    </div>`;
                }).join('');
            }

            // Diary & Badges
            document.getElementById('photo-diary').innerHTML = userState.diary.map(d => `<img src="${d.img}" class="rounded-2xl aspect-square object-cover shadow-sm">`).join('');
            document.getElementById('badge-container').innerHTML = userState.badges.map(b => `<div class="bg-white p-3 rounded-2xl text-center border-2 border-yellow-400 text-2xl">🏆<p class="text-[7px] font-black uppercase mt-1">${b}</p></div>`).join('');
        }

        function renderPartners() {
            document.getElementById('partners-list').innerHTML = PARTNERS.map(p => `
                <div class="bg-white p-4 rounded-3xl flex items-center gap-4 shadow-sm">
                    <img src="${p.img}" class="w-16 h-16 rounded-2xl object-cover">
                    <div class="flex-1">
                        <h4 class="font-black text-sm">${p.name}</h4>
                        <p class="text-[10px] text-blue-500 font-bold uppercase">${p.category}</p>
                        <p class="text-[9px] text-slate-400">${p.address}</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-300"></i>
                </div>
            `).join('');
        }

        function shareSocial() {
            if(navigator.share) {
                navigator.share({ title: 'BeeHunter Bari', text: 'Sto scalando la classifica di BeeHunter! 🐝', url: window.location.href })
                .then(() => { userState.xp += 5; save(); updateUI(); });
            } else { alert("Link copiato! Condividilo per +5 XP"); }
        }

        function save() { localStorage.setItem('beehunter_final_v1', JSON.stringify(userState)); }

        window.onload = init;
    </script>
</body>
</html>
