<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BEEHUNTER | BARI 2026</title>

    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Outfit:wght@300;400;700;900&display=swap');
        
        :root { --bee-y: #FACC15; --bee-d: #0F172A; --bee-w: #F8FAFC; --safe-top: env(safe-area-inset-top); }
        
        body { font-family: 'Outfit', sans-serif; background: var(--bee-w); color: var(--bee-d); margin: 0; overflow: hidden; height: 100vh; transition: 0.5s; }
        .font-black { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* SIDEBAR */
        #sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: var(--bee-d); z-index: 20000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 50px 25px; color: white; }
        #sidebar.open { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 19999; display: none; }
        .overlay.active { display: block; }

        /* VIEWPORT */
        .viewport { height: 100vh; overflow-y: auto; padding-top: 100px; padding-bottom: 140px; }
        header { position: fixed; top: 0; width: 100%; height: 90px; background: rgba(255,255,255,0.8); backdrop-filter: blur(15px); z-index: 9000; display: flex; align-items: center; justify-content: space-between; padding: var(--safe-top) 20px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        
        .bottom-nav { position: fixed; bottom: 25px; left: 20px; right: 20px; height: 80px; background: var(--bee-d); border-radius: 30px; z-index: 9000; display: flex; align-items: center; justify-content: space-around; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .nav-btn { color: rgba(255,255,255,0.4); display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .nav-btn.active { color: var(--bee-y); transform: translateY(-5px); }
        .nav-btn span { font-size: 0.6rem; font-weight: 800; margin-top: 4px; text-transform: uppercase; }

        /* UI ELEMENTS */
        #map { height: 350px; width: 100%; border-radius: 40px; border: 6px solid white; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .card { background: white; border-radius: 35px; padding: 20px; border: 1px solid rgba(0,0,0,0.05); transition: 0.3s; }
        
        /* SCANNER */
        #scanner-layer { position: fixed; inset: 0; z-index: 30000; background: black; display: none; flex-direction: column; }
        .scan-anim { width: 100%; height: 2px; background: var(--bee-y); box-shadow: 0 0 15px var(--bee-y); position: absolute; animation: scan 2s infinite; }
        @keyframes scan { 0% { top: 20%; } 50% { top: 80%; } 100% { top: 20%; } }

        /* BOTTOM SHEETS */
        .sheet { position: fixed; bottom: -100%; left: 0; right: 0; height: 85%; background: white; z-index: 15000; border-radius: 45px 45px 0 0; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); padding: 30px; overflow-y: auto; }
        .sheet.open { bottom: 0; }

        /* DARK MODE SUPPORT */
        .dark-theme { --bee-w: #0F172A; --bee-d: #F8FAFC; }
        .dark-theme header { background: rgba(15, 23, 42, 0.85); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .dark-theme .card { background: #1E293B; color: white; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <aside id="sidebar">
        <div class="flex items-center gap-4 mb-12">
            <div class="w-14 h-14 bg-yellow-400 rounded-2xl flex items-center justify-center text-slate-900 text-2xl font-black">B</div>
            <div><h2 class="font-black text-xl leading-none">BEEHUNTER</h2><p class="text-[9px] opacity-50 uppercase mt-1">Bari Detective Edition</p></div>
        </div>
        <nav class="space-y-6 text-lg font-bold">
            <button onclick="showSOS()" class="flex items-center gap-4 text-red-400"><i class="fa-solid fa-phone-flip"></i> SOS & Emergenze</button>
            <button onclick="toggleMenu()" class="flex items-center gap-4"><i class="fa-solid fa-bus"></i> Trasporti & Orari</button>
            <button onclick="toggleMenu()" class="flex items-center gap-4 opacity-50"><i class="fa-solid fa-gear"></i> Impostazioni</button>
            <hr class="border-white/10 my-6">
            <button onclick="resetApp()" class="text-sm opacity-30 uppercase">Reset Sessione</button>
        </nav>
    </aside>

    <header>
        <button onclick="toggleMenu()" class="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center text-lg"><i class="fa-solid fa-bars-staggered"></i></button>
        <div class="text-center">
            <h1 class="font-black italic text-2xl tracking-tighter">BEEHUNTER.</h1>
            <p id="meteo-brief" class="text-[8px] font-black text-yellow-600 uppercase tracking-widest">Caricamento...</p>
        </div>
        <button onclick="toggleChat()" class="w-12 h-12 bg-slate-900 text-white rounded-2xl flex items-center justify-center text-lg"><i class="fa-solid fa-headset"></i></button>
    </header>

    <div id="hint-note" class="fixed top-24 left-6 right-6 bg-slate-900 text-white p-5 rounded-3xl z-[25000] shadow-2xl transform -translate-y-64 transition-transform duration-700 border-b-4 border-yellow-400">
        <div class="flex items-start gap-4">
            <div class="text-2xl animate-bounce">🕵️‍♂️</div>
            <div class="flex-1">
                <p class="text-[8px] font-black text-yellow-400 uppercase mb-1">Indizio Rilevato</p>
                <p id="hint-text" class="text-xs font-medium leading-tight italic"></p>
            </div>
            <button onclick="closeHint()" class="opacity-30"><i class="fa-solid fa-times"></i></button>
        </div>
    </div>

    <main class="viewport px-6" id="main-content">
        
        <section id="radar-page" class="page block">
            <div id="meteo-widget" class="bg-gradient-to-br from-blue-500 to-indigo-600 p-5 rounded-[35px] text-white mb-6 shadow-xl flex justify-between items-center">
                <div>
                    <h3 id="m-temp" class="text-3xl font-black">21°C</h3>
                    <p id="m-adv" class="text-[9px] font-bold uppercase opacity-80 mt-1">Maestrale: Perfetto per la Focaccia</p>
                </div>
                <div class="text-right">
                    <span id="m-icon" class="text-4xl">☀️</span>
                </div>
            </div>
            <div id="map"></div>
            <div id="monument-list" class="space-y-4"></div>
        </section>

        <section id="profile-page" class="page hidden">
            <div class="text-center mb-10">
                <div class="w-28 h-28 bg-white rounded-[40px] mx-auto border-8 border-yellow-400 shadow-2xl overflow-hidden">
                    <img id="u-avatar" src="" class="w-full h-full">
                </div>
                <h2 id="u-name" class="text-3xl font-black italic mt-4 uppercase">Hunter</h2>
                <div class="flex justify-center gap-4 mt-4">
                    <div class="bg-white px-6 py-2 rounded-2xl shadow-sm border border-slate-100"><p class="text-[8px] font-black opacity-40">PUNTI XP</p><p id="u-xp" class="font-black">0</p></div>
                    <div class="bg-white px-6 py-2 rounded-2xl shadow-sm border border-slate-100"><p class="text-[8px] font-black opacity-40">RANK</p><p class="font-black text-yellow-500">PRO</p></div>
                </div>
            </div>

            <div class="mb-8">
                <h3 class="font-black italic text-sm text-slate-400 mb-4 px-2">TACCUINO INDIZI</h3>
                <div id="notebook-list" class="space-y-4"></div>
            </div>

            <div class="mb-8">
                <h3 class="font-black italic text-sm text-yellow-600 mb-4 px-2">PREMI SBLOCCATI</h3>
                <div id="coupon-list" class="space-y-3"></div>
            </div>
        </section>
    </main>

    <div id="scanner-layer">
        <video id="webcam" autoplay playsinline class="w-full h-full object-cover opacity-50"></video>
        <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
            <div class="w-72 h-72 border-2 border-white/20 rounded-[50px] relative overflow-hidden">
                <div class="scan-anim"></div>
            </div>
            <p id="scan-target-name" class="mt-10 text-yellow-400 font-black tracking-[0.2em] animate-pulse">ANALIZZANDO...</p>
        </div>
        <div class="absolute bottom-12 w-full px-10 flex justify-between items-center">
            <button onclick="closeScanner()" class="w-16 h-16 bg-white/10 backdrop-blur-md rounded-full text-white"><i class="fa-solid fa-times"></i></button>
            <button onclick="processScan()" class="w-24 h-24 bg-yellow-400 rounded-full shadow-[0_0_40px_rgba(250,204,21,0.5)] flex items-center justify-center text-3xl"><i class="fa-solid fa-expand"></i></button>
            <div class="w-16"></div>
        </div>
    </div>

    <div id="guide-sheet" class="sheet">
        <div id="guide-body"></div>
        <div id="voice-rec-area" class="mt-8 bg-slate-50 p-6 rounded-[35px] hidden">
            <p class="text-[9px] font-black text-center text-slate-400 mb-4 uppercase">Lascia una recensione vocale</p>
            <button id="rec-btn" onclick="handleVoiceRec()" class="w-16 h-16 bg-red-500 rounded-full mx-auto flex items-center justify-center text-white shadow-lg animate-pulse"><i class="fa-solid fa-microphone"></i></button>
        </div>
        <button onclick="closeGuide()" class="mt-8 w-full bg-slate-900 text-white py-5 rounded-3xl font-black uppercase italic">Chiudi Guida</button>
    </div>

    <nav class="bottom-nav">
        <button onclick="showPage('radar-page')" class="nav-btn active" id="btn-radar"><i class="fa-solid fa-compass"></i><span>Radar</span></button>
        <button onclick="showPage('profile-page')" class="nav-btn" id="btn-profile"><i class="fa-solid fa-fingerprint"></i><span>Dossier</span></button>
        <button onclick="toggleChat()" class="nav-btn"><i class="fa-solid fa-comment-dots"></i><span>Chat</span></button>
    </nav>

    <script>
        /* --- DATABASE COMPLETO --- */
        const DB = {
            monuments: [
                { id: 'm1', name: 'Basilica San Nicola', coords: [41.1315, 16.8722], xp: 150, bio: 'Custodisce le reliquie del Santo che ha dato origine al mito di Babbo Natale. Architettura romanica pugliese pura.', img: 'https://images.unsplash.com/photo-1549893072-4bc678117f45?w=600' },
                { id: 'm2', name: 'Castello Svevo', coords: [41.1288, 16.8644], xp: 150, bio: 'Fortezza federiciana imponente. Un tempo prigione e residenza reale, oggi cuore museale di Bari.', img: 'https://images.unsplash.com/photo-1569429532344-365287e0766b?w=600' }
            ],
            secrets: [
                { id: 'egg_arco', name: 'Arco delle Meraviglie', coords: [41.1305, 16.8710], xp: 500, hint: 'Cerca un ponte sospeso che unisce due amanti tra i vicoli...' },
                { id: 'egg_proiettile', name: 'Il Proiettile Storico', coords: [41.1316, 16.8720], xp: 550, hint: 'C’è un colpo di cannone incastrato in una facciata... guarda in alto!' }
            ]
        };

        /* --- APP STATE --- */
        let state = JSON.parse(localStorage.getItem('beehunter_v2026')) || {
            name: "Hunter_" + Math.floor(Math.random()*999),
            xp: 0,
            visited: [],
            hintsFound: [],
            coupons: []
        };
        let map, currentTarget = null;

        /* --- CORE FUNCTIONS --- */
        function init() {
            updateUI();
            initMap();
            initMeteo();
            applyTheme();
            checkHints();
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([41.130, 16.870], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            DB.monuments.forEach(m => {
                L.marker(m.coords).addTo(map).on('click', () => openGuide(m));
            });
        }

        function initMeteo() {
            const h = new Date().getHours();
            const brief = (h > 19 || h < 6) ? "🌙 Bari Notturna" : "☀️ Bari Soleggiata";
            document.getElementById('meteo-brief').innerText = brief;
        }

        function applyTheme() {
            const h = new Date().getHours();
            if(h > 19 || h < 6) document.body.classList.add('dark-theme');
        }

        /* --- NAVIGATION --- */
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'radar-page') {
                document.getElementById('btn-radar').classList.add('active');
                setTimeout(() => map.invalidateSize(), 300);
            } else {
                document.getElementById('btn-profile').classList.add('active');
                renderNotebook();
            }
        }

        /* --- SCANNER & GAME LOGIC --- */
        async function openScanner(item) {
            currentTarget = item;
            document.getElementById('scanner-layer').style.display = 'flex';
            document.getElementById('scan-target-name').innerText = "ANALIZZANDO: " + item.name.toUpperCase();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                document.getElementById('webcam').srcObject = stream;
            } catch(e) { console.log("Cam simulata"); }
        }

        function closeScanner() {
            const s = document.getElementById('webcam').srcObject;
            if(s) s.getTracks().forEach(t => t.stop());
            document.getElementById('scanner-layer').style.display = 'none';
        }

        function processScan() {
            if(state.visited.includes(currentTarget.id)) return alert("Già acquisito!");
            
            state.xp += currentTarget.xp;
            state.visited.push(currentTarget.id);
            
            // Check per coupon (ogni 2 monumenti)
            if(state.visited.length % 2 === 0) {
                const c = { id: Date.now(), title: "Birra Omaggio", partner: "Mastro Ciccio", code: "BEE-26" };
                state.coupons.push(c);
            }

            save();
            closeScanner();
            closeGuide();
            updateUI();
            
            // Text to Speech
            if(currentTarget.bio) {
                const speech = new SpeechSynthesisUtterance("Missione compiuta! Ecco la storia: " + currentTarget.bio);
                speech.lang = 'it-IT';
                window.speechSynthesis.speak(speech);
            }
        }

        /* --- NOTEBOOK & HINTS --- */
        function checkHints() {
            // Simulazione: se sei entro X metri (qui attiviamo a caso per demo)
            DB.secrets.forEach(s => {
                if(!state.hintsFound.includes(s.id) && !state.visited.includes(s.id)) {
                    setTimeout(() => triggerHint(s), 3000);
                }
            });
        }

        function triggerHint(egg) {
            state.hintsFound.push(egg.id);
            save();
            const note = document.getElementById('hint-note');
            document.getElementById('hint-text').innerText = egg.hint;
            note.style.transform = 'translateY(0)';
        }

        function closeHint() { document.getElementById('hint-note').style.transform = 'translateY(-260px)'; }

        function renderNotebook() {
            const list = document.getElementById('notebook-list');
            const openCases = DB.secrets.filter(s => state.hintsFound.includes(s.id) && !state.visited.includes(s.id));
            
            list.innerHTML = openCases.map(s => `
                <div class="card border-l-8 border-yellow-400">
                    <p class="text-[10px] font-black text-slate-400 mb-1 uppercase">Indizio Enigma</p>
                    <p class="text-xs font-bold italic">"${s.hint}"</p>
                    <div class="flex gap-2 mt-4">
                        <button onclick="openScanner({id:'${s.id}', name:'${s.name}', xp:${s.xp}})" class="bg-yellow-400 text-[9px] font-black px-4 py-2 rounded-xl uppercase">Risolvi</button>
                        <button onclick="shareCase('${s.id}')" class="bg-slate-100 text-[9px] font-black px-4 py-2 rounded-xl uppercase"><i class="fa-solid fa-share"></i></button>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('coupon-list').innerHTML = state.coupons.map(c => `
                <div class="bg-yellow-400 p-4 rounded-3xl flex justify-between items-center border-2 border-dashed border-slate-900">
                    <div><h4 class="font-black italic text-xs">${c.title}</h4><p class="text-[8px] font-bold">${c.partner}</p></div>
                    <div class="bg-slate-900 text-white px-3 py-1 rounded-lg font-mono text-xs">${c.code}</div>
                </div>
            `).join('');
        }

        /* --- UI UTILS --- */
        function openGuide(m) {
            currentTarget = m;
            document.getElementById('guide-body').innerHTML = `
                <img src="${m.img}" class="w-full h-48 object-cover rounded-[35px] mb-6 shadow-lg">
                <h2 class="text-3xl font-black italic uppercase">${m.name}</h2>
                <p class="text-sm text-slate-500 mt-4 leading-relaxed">${m.bio}</p>
                <div class="mt-8 p-6 bg-yellow-50 rounded-3xl border border-yellow-100">
                    <p class="text-[9px] font-black text-yellow-600 uppercase">Ricompensa</p>
                    <p class="text-xl font-black">+${m.xp} XP</p>
                </div>
                <button onclick="openScanner(currentTarget)" class="w-full mt-6 bg-yellow-400 py-5 rounded-3xl font-black text-lg shadow-xl">AVVIA SCANNER AR</button>
            `;
            document.getElementById('guide-sheet').classList.add('open');
            document.getElementById('voice-rec-area').classList.remove('hidden');
        }

        function closeGuide() { document.getElementById('guide-sheet').classList.remove('open'); }

        function updateUI() {
            document.getElementById('u-name').innerText = state.name;
            document.getElementById('u-xp').innerText = state.xp;
            document.getElementById('u-avatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${state.name}`;
            renderMonumentList();
        }

        function renderMonumentList() {
            document.getElementById('monument-list').innerHTML = DB.monuments.map(m => `
                <div class="card flex items-center gap-4 ${state.visited.includes(m.id) ? 'opacity-50' : ''}" onclick="openGuide(${JSON.stringify(m).replace(/"/g, '&quot;')})">
                    <img src="${m.img}" class="w-16 h-16 rounded-2xl object-cover">
                    <div class="flex-1">
                        <h4 class="font-black italic text-sm">${m.name}</h4>
                        <p class="text-[9px] font-black text-yellow-600">+${m.xp} XP</p>
                    </div>
                    ${state.visited.includes(m.id) ? '<i class="fa-solid fa-check-circle text-green-500"></i>' : '<i class="fa-solid fa-chevron-right opacity-20"></i>'}
                </div>
            `).join('');
        }

        function save() { localStorage.setItem('beehunter_v2026', JSON.stringify(state)); }
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); }
        function toggleChat() { alert("Servizio BeeBot H24: \nAttualmente siamo molto impegnati nei vicoli. Riprova più tardi!"); }
        function shareCase(id) { navigator.share({ title: 'Indizio BeeHunter', text: 'Aiutami a risolvere questo enigma a Bari!' }); }
        function showSOS() { alert("EMERGENZA BARI:\n112 Numero Unico\n080 5543333 Taxi"); }
        function resetApp() { if(confirm("Cancellare tutti i progressi?")) { localStorage.clear(); location.reload(); } }

        window.onload = init;
    </script>
</body>
</html>
