<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BEEHUNTER PRO | BARI 2026</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Outfit:wght@300;400;600;900&display=swap');
        
        :root { 
            --sun: #FFD700; --orange: #FF8C00; --sea: #00BFFF; 
            --dark: #1E293B; --bg: #FFFDF0; --accent: #FF4757;
            --xmas: #C41E3A; --san-nicola: #8B0000;
        }

        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--dark); margin: 0; overflow: hidden; height: 100vh; }
        .font-black { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* UI GENERALE - DESIGN AGGRESSIVO */
        header { 
            position: fixed; top: 0; width: 100%; height: 110px; 
            background: var(--sun); z-index: 1000; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 20px; 
            border-bottom: 5px solid var(--dark); box-shadow: 0 4px 0 var(--orange);
        }

        .bottom-nav { 
            position: fixed; bottom: 15px; left: 15px; right: 15px; height: 85px; 
            background: var(--dark); border-radius: 35px; z-index: 5000; 
            display: flex; align-items: center; justify-content: space-around;
            border: 4px solid var(--sun); box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .nav-btn { color: white; flex-direction: column; display: flex; align-items: center; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .nav-btn.active { color: var(--sun); transform: scale(1.15) translateY(-5px); }
        .nav-btn span { font-size: 0.65rem; font-weight: 900; text-transform: uppercase; margin-top: 5px; }

        /* PAGES */
        .page { height: 100vh; overflow-y: auto; padding: 130px 20px 140px; display: none; }
        .page.active { display: block; animation: fadeInUp 0.4s both; }

        /* CARDS & SPECIAL EVENTS */
        .card { 
            background: white; border-radius: 35px; padding: 22px; margin-bottom: 25px; 
            border: 4px solid var(--dark); box-shadow: 6px 6px 0 var(--orange);
            transition: all 0.2s; position: relative;
        }
        .card:active { transform: translate(4px, 4px); box-shadow: 0 0 0; }

        .event-card {
            background: linear-gradient(135deg, var(--xmas), #8B0000);
            color: white; border: 4px solid var(--dark);
            box-shadow: 6px 6px 0 var(--dark);
        }

        /* COUNTDOWN BOX */
        .timer-box {
            display: flex; gap: 8px; justify-content: center; margin-top: 15px;
        }
        .timer-unit {
            background: rgba(0,0,0,0.3); padding: 8px; border-radius: 12px;
            min-width: 50px; text-align: center;
        }
        .timer-unit span { display: block; font-weight: 900; font-size: 1.2rem; }
        .timer-unit label { font-size: 0.5rem; text-transform: uppercase; font-weight: 600; opacity: 0.8; }

        /* MAPPA */
        #map { height: 350px; width: 100%; border-radius: 40px; border: 5px solid var(--dark); box-shadow: 10px 10px 0 var(--orange); margin-bottom: 30px; }

        /* SCANNER */
        #scanner-view { position: fixed; inset: 0; background: black; z-index: 9999; display: none; }
        .scan-target { position: absolute; inset: 60px; border: 4px solid var(--sun); border-radius: 50px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.7); }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--sun); box-shadow: 0 0 20px var(--sun); animation: scan 2s infinite linear; }
        @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

        /* XP BAR */
        .xp-pill { background: var(--dark); color: var(--sun); padding: 6px 15px; border-radius: 20px; font-weight: 900; font-size: 14px; border: 2px solid var(--orange); }
    </style>
</head>
<body>

    <div id="toast" class="fixed top-32 left-6 right-6 bg-white border-4 border-dark p-5 rounded-[30px] z-[10000] transform -translate-y-[250%] transition-all shadow-[8px_8px_0_var(--orange)]">
        <div class="flex items-center gap-4">
            <div id="toast-icon" class="text-4xl">🐝</div>
            <div>
                <p id="toast-title" class="font-black text-[10px] text-orange-500 uppercase">BeeHunter Alert</p>
                <p id="toast-msg" class="text-sm font-bold"></p>
            </div>
        </div>
    </div>

    <header>
        <div>
            <h1 class="font-black italic text-3xl text-white drop-shadow-[3px_3px_0_var(--dark)]">BEEHUNTER</h1>
            <div class="flex items-center gap-2 bg-white/30 rounded-full px-3 py-1 mt-1">
                <span id="meteo-icon">☀️</span>
                <span id="meteo-text" class="text-[8px] font-black uppercase">Vento di Maestrale</span>
            </div>
        </div>
        <div class="flex flex-col items-end">
            <div class="xp-pill" id="total-xp">0 XP</div>
            <p class="text-[7px] font-black mt-1 uppercase opacity-70">Detective Liv. 1</p>
        </div>
    </header>

    <nav class="bottom-nav">
        <button onclick="switchPage('radar')" id="nav-radar" class="nav-btn active"><i class="fa-solid fa-map-marked-alt"></i><span>Radar</span></button>
        <button onclick="switchPage('events')" id="nav-events" class="nav-btn"><i class="fa-solid fa-calendar-star"></i><span>Eventi</span></button>
        <button onclick="switchPage('cases')" id="nav-cases" class="nav-btn"><i class="fa-solid fa-mask"></i><span>Casi</span></button>
        <button onclick="switchPage('profile')" id="nav-profile" class="nav-btn"><i class="fa-solid fa-user-ninja"></i><span>Tu</span></button>
    </nav>

    <main id="page-radar" class="page active">
        <div id="map"></div>
        <h3 class="font-black italic text-xl uppercase mb-4 text-orange-500">🔥 Obiettivi Bari</h3>
        <div id="radar-list" class="space-y-4"></div>
    </main>

    <main id="page-events" class="page">
        <div class="event-card p-6 rounded-[40px] mb-8 relative overflow-hidden" id="main-event-box">
            <div class="relative z-10">
                <p class="text-[10px] font-black uppercase tracking-[0.2em] mb-2" id="event-tag">Speciale San Nicola</p>
                <h2 class="text-3xl font-black italic uppercase leading-none" id="event-title">Caricamento...</h2>
                
                <div class="timer-box" id="countdown">
                    <div class="timer-unit"><span id="days">00</span><label>Giorni</label></div>
                    <div class="timer-unit"><span id="hours">00</span><label>Ore</label></div>
                    <div class="timer-unit"><span id="mins">00</span><label>Min</label></div>
                    <div class="timer-unit"><span id="secs">00</span><label>Sec</label></div>
                </div>

                <div class="mt-6 flex gap-2">
                    <button class="bg-white text-dark px-4 py-2 rounded-xl font-black text-[10px] uppercase">Vedi Challenge</button>
                    <button onclick="shareWA('Sbrighiamoci! Mancano pochi giorni all\'evento di Bari!')" class="bg-dark/30 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase"><i class="fa-brands fa-whatsapp"></i> Invita</button>
                </div>
            </div>
            <i class="fa-solid fa-holly-berry absolute -bottom-4 -right-4 text-8xl opacity-10"></i>
        </div>

        <h3 class="font-black italic text-lg mb-4 uppercase">Sfide Stagionali</h3>
        <div id="event-challenges" class="space-y-4"></div>
    </main>

    <main id="page-cases" class="page">
        <div class="card bg-dark text-white p-6 border-sun shadow-[6px_6px_0_var(--orange)]">
            <h2 class="text-2xl font-black italic uppercase">Misteri dei Vicoli</h2>
            <p class="text-[9px] font-bold opacity-60 uppercase tracking-widest mt-1">Raccogli 100 XP per il primo premio</p>
        </div>
        <div id="notebook-list" class="mt-6 space-y-4"></div>
    </main>

    <main id="page-profile" class="page text-center">
        <div class="w-32 h-32 mx-auto bg-white border-4 border-dark rounded-[45px] shadow-[8px_8px_0_var(--orange)] overflow-hidden mb-6">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=BariHunter" class="w-full h-full">
        </div>
        <h2 class="text-3xl font-black italic uppercase">Bari Hunter #01</h2>
        <div id="badge-collection" class="flex flex-wrap justify-center gap-3 mt-6"></div>
        <div id="coupon-area" class="mt-10 text-left">
            <h3 class="font-black italic text-xl uppercase mb-4 text-sea">I Tuoi Premi</h3>
            <div id="coupon-list" class="space-y-3"></div>
        </div>
    </main>

    <div id="scanner-view">
        <video id="camera" class="w-full h-full object-cover" autoplay playsinline></video>
        <div class="scan-target"><div class="scan-line"></div></div>
        <div class="absolute bottom-12 w-full flex justify-center gap-12 px-10">
            <button onclick="stopScanner()" class="w-16 h-16 bg-white/20 backdrop-blur-md rounded-full text-white"><i class="fa-solid fa-x"></i></button>
            <button onclick="capturePoint()" class="w-24 h-24 bg-sun rounded-full shadow-[0_0_40px_var(--sun)] border-4 border-dark flex items-center justify-center text-4xl"><i class="fa-solid fa-fingerprint"></i></button>
        </div>
    </div>

    <script>
        /* --- DATABASE ESTREMO --- */
        const DB = {
            points: [
                { id: 'm1', name: 'Basilica San Nicola', lat: 41.1315, lng: 16.8722, pt: 20, bio: 'Cuore della cristianità e ponte tra oriente e occidente.', badge: 'Devoto Barese' },
                { id: 'm2', name: 'Castello Svevo', lat: 41.1288, lng: 16.8644, pt: 20, bio: 'La fortezza di Federico II che domina il mare.' },
                { id: 'm3', name: 'Teatro Petruzzelli', lat: 41.1250, lng: 16.8720, pt: 20, bio: 'Il tempio della lirica barese.' },
                { id: 'm4', name: 'Cattedrale San Sabino', lat: 41.1285, lng: 16.8690, pt: 20, bio: 'Capolavoro del romanico pugliese.' },
                { id: 'm5', name: 'Teatro Margherita', lat: 41.1265, lng: 16.8730, pt: 20, bio: 'L\'unico teatro al mondo costruito sull\'acqua.' },
                { id: 'f1', name: 'Panificio Fiore', hint: 'Segui il profumo di focaccia vicino a San Nicola...', pt: 15, badge: 'Focaccia King' },
                { id: 'f2', name: 'Largo Albicocca', hint: 'Il regno delle orecchiette e dell\'amore barese...', pt: 50, badge: 'Love in Bari' }
            ],
            events: [
                { id: 'sn', name: 'Festa di San Nicola', date: 'May 7, 2026 00:00:00', color: 'var(--san-nicola)', tag: 'Religione & Tradizione' },
                { id: 'xm', name: 'Mercatini di Natale', date: 'Dec 6, 2026 00:00:00', color: 'var(--xmas)', tag: 'Inverno a Bari' }
            ]
        };

        let state = JSON.parse(localStorage.getItem('beehunter_pro_v1')) || { xp: 0, visited: [], badges: [], coupons: [] };
        let map, currentTarget = null;

        /* --- INITIALIZATION --- */
        function init() {
            initMap();
            updateUI();
            startCountdown();
            initMeteo();
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([41.130, 16.870], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            DB.points.forEach(p => {
                if(p.lat) L.marker([p.lat, p.lng], { icon: L.divIcon({className: 'bg-orange-500 w-3 h-3 rounded-full border-2 border-white'}) }).addTo(map);
            });
        }

        /* --- UI LOGIC --- */
        function switchPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
            document.getElementById('nav-'+id).classList.add('active');
            if(id==='radar') setTimeout(() => map.invalidateSize(), 200);
        }

        function updateUI() {
            document.getElementById('total-xp').innerText = state.xp + " XP";
            
            // Radar List
            const rList = document.getElementById('radar-list');
            rList.innerHTML = DB.points.filter(p => !p.hint && !state.visited.includes(p.id)).map(p => `
                <div class="card flex justify-between items-center animate__animated animate__fadeInUp">
                    <div><h4 class="font-black italic text-sm uppercase">${p.name}</h4><p class="text-[9px] font-black text-sea">+${p.pt} XP</p></div>
                    <button onclick="startScanner('${p.id}')" class="bg-sun border-3 border-dark px-4 py-2 rounded-xl text-[10px] font-black uppercase">Cattura</button>
                </div>
            `).join('');

            // Notebook List
            const nList = document.getElementById('notebook-list');
            nList.innerHTML = DB.points.filter(p => p.hint && !state.visited.includes(p.id)).map(p => `
                <div class="card border-l-8 border-orange-500 bg-white">
                    <p class="text-[9px] font-black opacity-40 uppercase mb-2">Mistero Barese</p>
                    <p class="text-xs font-bold italic leading-tight">"${p.hint}"</p>
                    <div class="mt-5 flex gap-2">
                        <button onclick="startScanner('${p.id}')" class="bg-dark text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Risolvi</button>
                        <button onclick="shareWA('${p.hint}')" class="bg-green-500 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase"><i class="fa-brands fa-whatsapp"></i></button>
                    </div>
                </div>
            `).join('');

            // Badges
            document.getElementById('badge-collection').innerHTML = state.badges.map(b => `
                <div class="bg-white border-3 border-dark rounded-2xl p-3 text-center min-w-[80px]">
                    <div class="text-2xl mb-1">🏅</div>
                    <p class="text-[8px] font-black uppercase">${b}</p>
                </div>
            `).join('');

            // Coupons
            document.getElementById('coupon-list').innerHTML = state.coupons.map(c => `
                <div class="card bg-sun flex justify-between items-center border-dashed">
                    <div><h4 class="font-black text-xs uppercase">${c.name}</h4><p class="text-[8px] font-bold">Codice: ${c.code}</p></div>
                    <i class="fa-solid fa-ticket text-2xl opacity-20"></i>
                </div>
            `).join('');

            localStorage.setItem('beehunter_pro_v1', JSON.stringify(state));
        }

        /* --- EVENT COUNTDOWN LOGIC --- */
        function startCountdown() {
            const now = new Date().getTime();
            let activeEvent = DB.events[0]; // Default San Nicola
            
            // Se San Nicola è passato, passa a Natale
            if (new Date(DB.events[0].date).getTime() < now) {
                activeEvent = DB.events[1];
            }

            const eventBox = document.getElementById('main-event-box');
            const eventTitle = document.getElementById('event-title');
            const eventTag = document.getElementById('event-tag');
            
            eventBox.style.background = `linear-gradient(135deg, ${activeEvent.color}, #222)`;
            eventTitle.innerText = activeEvent.name;
            eventTag.innerText = activeEvent.tag;

            setInterval(() => {
                const now = new Date().getTime();
                const dist = new Date(activeEvent.date).getTime() - now;

                document.getElementById('days').innerText = Math.floor(dist / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
                document.getElementById('hours').innerText = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
                document.getElementById('mins').innerText = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                document.getElementById('secs').innerText = Math.floor((dist % (1000 * 60)) / 1000).toString().padStart(2, '0');
            }, 1000);

            // Sfide stagionali
            const challenges = [
                { name: "Selfie col Santo", pt: 100, icon: "📸" },
                { name: "Assaggia il Torrone", pt: 50, icon: "🍬" }
            ];
            document.getElementById('event-challenges').innerHTML = challenges.map(c => `
                <div class="card flex items-center gap-4 bg-white/10 !border-white text-white">
                    <div class="text-2xl">${c.icon}</div>
                    <div class="flex-1 font-black text-xs uppercase">${c.name}</div>
                    <div class="text-xs font-black">+${c.pt} XP</div>
                </div>
            `).join('');
        }

        /* --- SCANNER & GAMEPLAY --- */
        async function startScanner(id) {
            currentTarget = DB.points.find(p => p.id === id);
            document.getElementById('scanner-view').style.display = 'block';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                document.getElementById('camera').srcObject = stream;
            } catch(e) { notify("CAM ERROR", "Accesso fotocamera negato."); }
        }

        function stopScanner() {
            const s = document.getElementById('camera').srcObject;
            if(s) s.getTracks().forEach(t => t.stop());
            document.getElementById('scanner-view').style.display = 'none';
        }

        function capturePoint() {
            state.xp += currentTarget.pt;
            state.visited.push(currentTarget.id);
            if(currentTarget.badge) state.badges.push(currentTarget.badge);
            
            // Premio ogni 100 XP
            if(Math.floor(state.xp/100) > state.coupons.length) {
                state.coupons.push({ name: "Sconto 20% Panino", code: "BH-"+Math.floor(Math.random()*9000) });
                notify("PREMIO SBLOCCATO", "Controlla la sezione Premi!");
            }

            // Audio Bio
            if(currentTarget.bio) {
                const msg = new SpeechSynthesisUtterance(currentTarget.bio);
                msg.lang = 'it-IT';
                window.speechSynthesis.speak(msg);
            }

            notify("CATTURATO!", `+${currentTarget.pt} XP per ${currentTarget.name}`);
            stopScanner();
            updateUI();
        }

        /* --- UTILS --- */
        function notify(title, msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-msg').innerText = msg;
            t.style.transform = "translateY(0)";
            setTimeout(() => t.style.transform = "translateY(-250%)", 3500);
        }

        function shareWA(txt) {
            window.open(`https://wa.me/?text=Ehi! Guarda questa sfida su BeeHunter Bari: ${txt} 🐝`, '_blank');
        }

        function initMeteo() {
            const winds = ["Maestrale", "Scirocco", "Tramontana", "Grecale"];
            const randomWind = winds[Math.floor(Math.random()*winds.length)];
            document.getElementById('meteo-text').innerText = "Vento di " + randomWind;
            if(randomWind === "Scirocco") document.getElementById('meteo-icon').innerText = "🥵";
        }

        window.onload = init;
    </script>
</body>
</html>
