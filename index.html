<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BeeHunter Bari | Ultimate Pro</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap');
        :root { --bee-yellow: #FFD200; --bari-blue: #0056b3; --tier-base: #94a3b8; --tier-mid: #3b82f6; --tier-adv: #a855f7; }
        body { font-family: 'Outfit', sans-serif; background: #F8FAFC; color: #0F172A; overflow: hidden; height: 100vh; }
        
        .page { display: none; height: 100vh; overflow-y: auto; padding: 100px 16px 120px; }
        .page.active { display: block; animation: fadeInUp 0.4s ease; }
        
        /* Custom UI */
        .glass-header { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); position: fixed; top:0; width:100%; z-index: 1000; padding: env(safe-area-inset-top) 20px 15px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .bottom-nav { background: white; border-top: 1px solid #e2e8f0; position: fixed; bottom: 0; width: 100%; height: 85px; display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; font-size: 10px; font-weight: 800; }
        .nav-item.active { color: var(--bari-blue); }
        
        .card-point { background: white; border-radius: 20px; overflow: hidden; margin-bottom: 16px; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .badge-icon { width: 100%; aspect-ratio: 1; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        
        /* Marker Styles */
        .custom-div-icon { background: var(--bee-yellow); border: 3px solid white; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        #toast { position: fixed; top: 110px; left: 50%; transform: translateX(-50%); z-index: 9999; display: none; }
    </style>
</head>
<body>

    <div id="toast" class="animate__animated">
        <div class="bg-black text-white px-6 py-3 rounded-full font-bold shadow-2xl flex items-center gap-3">
            <i class="fa-solid fa-star text-yellow-400"></i>
            <span id="toast-msg"></span>
        </div>
    </div>

    <header class="glass-header flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-yellow-400 p-2 rounded-lg shadow-sm"><i class="fa-solid fa-bee"></i></div>
            <h1 class="font-black text-xl tracking-tighter">BEEHUNTER</h1>
        </div>
        <div class="flex items-center gap-3">
            <div class="text-right">
                <p class="text-[10px] font-black text-slate-400 uppercase leading-none" id="rank-name">Larva</p>
                <p class="text-sm font-black text-blue-600" id="total-xp">0 XP</p>
            </div>
            <button onclick="changeLang()" class="bg-slate-100 px-2 py-1 rounded-md text-[10px] font-bold" id="lang-btn">IT</button>
        </div>
    </header>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="nav('home')"><i class="fa-solid fa-map-location-dot text-xl mb-1"></i><span data-it="RADAR" data-en="RADAR">RADAR</span></div>
        <div class="nav-item" onclick="nav('tours')"><i class="fa-solid fa-route text-xl mb-1"></i><span data-it="TOUR" data-en="TOURS">TOUR</span></div>
        <div class="nav-item" onclick="nav('shop')"><i class="fa-solid fa-bag-shopping text-xl mb-1"></i><span data-it="SHOP" data-en="SHOP">SHOP</span></div>
        <div class="nav-item" onclick="nav('profile')"><i class="fa-solid fa-user-astronaut text-xl mb-1"></i><span data-it="IO" data-en="ME">IO</span></div>
    </nav>

    <main id="home" class="page active">
        <div id="map" style="height: 350px; border-radius: 24px; margin-bottom: 20px;"></div>
        <div class="flex items-center justify-between mb-4">
            <h2 class="font-black text-xl" data-it="Esplora Bari e Provincia" data-en="Explore Bari & Province">Esplora Bari</h2>
            <select id="filter-type" class="text-xs font-bold bg-white border-none rounded-lg p-2 shadow-sm" onchange="renderPoints()">
                <option value="all">Tutti</option>
                <option value="Monumento">Monumenti</option>
                <option value="Natura">Natura</option>
                <option value="Food">Food</option>
            </select>
        </div>
        <div id="points-list"></div>
    </main>

    <main id="tours" class="page">
        <h2 class="font-black text-2xl mb-2" data-it="Esperienze Premium" data-en="Premium Experiences">Esperienze Premium</h2>
        <p class="text-slate-500 text-sm mb-6" data-it="Sblocca badge unici completando questi tour" data-en="Unlock unique badges by completing these tours">Sblocca badge unici</p>
        <div id="tours-list" class="space-y-4"></div>
    </main>

    <main id="shop" class="page">
        <div class="bg-blue-600 p-6 rounded-[32px] text-white mb-6">
            <h2 class="text-2xl font-black">Marketplace</h2>
            <p class="opacity-80" data-it="Spendi i tuoi XP per premi reali" data-en="Spend your XP for real rewards">Usa i tuoi XP per premi reali</p>
        </div>
        <div id="coupons-list" class="space-y-4"></div>
        <div class="mt-8 p-4 bg-yellow-50 rounded-2xl border border-yellow-200">
            <h4 class="font-black text-yellow-800">XP Boosters</h4>
            <p class="text-xs mb-3">Sblocca subito 1000 XP per scalare la classifica.</p>
            <button class="w-full bg-yellow-400 p-3 rounded-xl font-black text-sm">BUY 1000 XP (€4.99)</button>
        </div>
    </main>

    <main id="profile" class="page">
        <div class="flex items-center gap-4 mb-8">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-20 h-20 rounded-3xl bg-white shadow-lg">
            <div>
                <h2 class="font-black text-2xl">Pro Hunter</h2>
                <div class="flex gap-2 mt-1">
                    <span class="bg-blue-100 text-blue-700 text-[10px] font-black px-2 py-0.5 rounded">LEVEL 12</span>
                    <span class="bg-purple-100 text-purple-700 text-[10px] font-black px-2 py-0.5 rounded">PREMIUM</span>
                </div>
            </div>
        </div>
        <h3 class="font-black text-lg mb-4" data-it="Collezione Badge" data-en="Badge Collection">Badge Collection</h3>
        <div id="badge-grid" class="grid grid-cols-3 gap-3"></div>
    </main>

    <script>
        /* --- CORE DATABASE (Template per 200 punti) --- */
        const DB = {
            points: [
                { id: 1, name: "Basilica San Nicola", type: "Monumento", coords: [41.1315, 16.8722], xp: 150, img: "https://images.unsplash.com/photo-1541339907198-e08756ebafe1?w=400", it: "Cuore di Bari Vecchia.", en: "Heart of Old Bari.", badge: "City Explorer" },
                { id: 2, name: "Castello Svevo", type: "Monumento", coords: [41.1288, 16.8644], xp: 180, img: "https://images.unsplash.com/photo-1590001158193-79013018e2df?w=400", it: "Fortezza millenaria.", en: "Millenary fortress.", badge: "City Explorer" },
                { id: 3, name: "Lama Monachile", type: "Natura", coords: [41.1230, 17.2080], xp: 200, img: "https://images.unsplash.com/photo-1516483638261-f4dbaf036963?w=400", it: "Spiaggia iconica a Polignano.", en: "Iconic beach in Polignano.", badge: "Sea Hunter" },
                { id: 4, name: "Trullo Sovrano", type: "Cultura", coords: [40.7860, 17.2370], xp: 180, img: "https://images.unsplash.com/photo-1528114039593-4366cc08227d?w=400", it: "Il trullo più grande.", en: "The largest trullo.", badge: "Heritage Seeker" },
                { id: 5, name: "Faro di Monopoli", type: "Natura", coords: [40.9520, 17.3050], xp: 120, img: "https://images.unsplash.com/photo-1505118380757-91f5f45d8de4?w=400", it: "Vista sul mare Adriatico.", en: "View of the Adriatic Sea.", badge: "Sea Hunter" },
                // ... Qui si estende fino a 200 punti
            ],
            tours: [
                { id: 't1', name: "Street Food Mania", xp: 300, it: "Focaccia, panzerotti e segreti di Bari.", en: "Focaccia, panzerotti and Bari secrets.", badge: "Foodie Hunter", price: "Free" },
                { id: 't2', name: "Coastal Adventure", xp: 500, it: "Da Polignano a Monopoli via mare.", en: "From Polignano to Monopoli by sea.", badge: "Sea Hunter", price: "€15.00" }
            ],
            coupons: [
                { id: 'c1', partner: "Panificio Fiore", reward: "Focaccia Omaggio", cost: 400, img: "https://images.unsplash.com/photo-1509440159596-0249088772ff?w=100" },
                { id: 'c2', partner: "Speakeasy Bari", reward: "25% Sconto Cocktail", cost: 600, img: "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=100" }
            ],
            badges: [
                { id: "City Explorer", tier: "base", icon: "🏙️", color: "bg-slate-100" },
                { id: "Foodie Hunter", tier: "base", icon: "🍕", color: "bg-orange-100" },
                { id: "Sea Hunter", tier: "mid", icon: "🌊", color: "bg-blue-100" },
                { id: "Heritage Seeker", tier: "mid", icon: "🏛️", color: "bg-purple-100" },
                { id: "Master Hunter", tier: "adv", icon: "👑", color: "bg-yellow-100" }
            ]
        };

        /* --- STATE MANAGEMENT --- */
        let state = JSON.parse(localStorage.getItem('beehunter_v4')) || {
            xp: 0, visited: [], badges: [], lang: 'it'
        };

        let map, clusters;

        function init() {
            setupMap();
            renderPoints();
            renderTours();
            renderShop();
            renderProfile();
            updateUI();
        }

        /* --- MAPPA CON CLUSTERING --- */
        function setupMap() {
            map = L.map('map', { zoomControl: false }).setView([41.125, 16.872], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            
            clusters = L.markerClusterGroup();
            
            DB.points.forEach(p => {
                const marker = L.marker(p.coords, {
                    icon: L.divIcon({ className: 'custom-div-icon', iconSize: [12, 12] })
                });
                
                const popupContent = `
                    <div class="p-2" style="width:150px">
                        <img src="${p.img}" class="w-full h-20 object-cover rounded-lg mb-2">
                        <h4 class="font-black text-xs">${p.name}</h4>
                        <button onclick="collectPoint(${p.id})" class="mt-2 w-full bg-yellow-400 text-[10px] font-black py-1 rounded">CLAIM ${p.xp} XP</button>
                    </div>
                `;
                marker.bindPopup(popupContent);
                clusters.addLayer(marker);
            });
            
            map.addLayer(clusters);
        }

        /* --- RENDER FUNCTIONS --- */
        function renderPoints() {
            const filter = document.getElementById('filter-type').value;
            const container = document.getElementById('points-list');
            const filtered = filter === 'all' ? DB.points : DB.points.filter(p => p.type === filter);
            
            container.innerHTML = filtered.map(p => `
                <div class="card-point flex items-center p-3 gap-4 ${state.visited.includes(p.id) ? 'opacity-40 grayscale' : ''}">
                    <img src="${p.img}" class="w-16 h-16 rounded-xl object-cover">
                    <div class="flex-1">
                        <h4 class="font-black text-sm">${p.name}</h4>
                        <p class="text-[10px] text-slate-400 font-bold">${state.lang === 'it' ? p.it : p.en}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-blue-600 font-black text-xs">+${p.xp} XP</span>
                        <br>
                        <button onclick="collectPoint(${p.id})" class="text-[10px] font-black text-slate-400 border px-2 py-1 rounded-md mt-1">INFO</button>
                    </div>
                </div>
            `).join('');
        }

        function renderTours() {
            document.getElementById('tours-list').innerHTML = DB.tours.map(t => `
                <div class="card-point p-4">
                    <div class="flex justify-between items-start mb-3">
                        <span class="bg-blue-600 text-white text-[10px] font-black px-2 py-1 rounded-lg">${t.price}</span>
                        <span class="text-blue-600 font-black">+${t.xp} XP</span>
                    </div>
                    <h3 class="font-black text-lg">${t.name}</h3>
                    <p class="text-sm text-slate-500 mb-4">${state.lang === 'it' ? t.it : t.en}</p>
                    <button onclick="toast('Tour Prenotato!')" class="w-full bg-slate-900 text-white font-black py-3 rounded-xl text-sm">BOOK EXPERIENCE</button>
                </div>
            `).join('');
        }

        function renderShop() {
            document.getElementById('coupons-list').innerHTML = DB.coupons.map(c => `
                <div class="card-point p-4 flex items-center gap-4 ${state.xp < c.cost ? 'opacity-50' : ''}">
                    <img src="${c.img}" class="w-12 h-12 rounded-xl">
                    <div class="flex-1">
                        <h4 class="font-black text-sm">${c.partner}</h4>
                        <p class="text-xs text-blue-600 font-bold">${c.reward}</p>
                    </div>
                    <button onclick="redeemCoupon(${c.cost}, '${c.reward}')" class="bg-slate-100 px-3 py-2 rounded-xl font-black text-[10px]">${c.cost} XP</button>
                </div>
            `).join('');
        }

        function renderProfile() {
            document.getElementById('badge-grid').innerHTML = DB.badges.map(b => {
                const isLocked = !state.badges.includes(b.id);
                return `
                    <div class="card-point p-3 text-center ${isLocked ? 'opacity-20 grayscale' : 'border-b-4 border-yellow-400'}">
                        <div class="badge-icon ${b.color} mb-2">${b.icon}</div>
                        <p class="text-[8px] font-black uppercase leading-tight">${b.id}</p>
                    </div>
                `;
            }).join('');
        }

        /* --- LOGICA DI GIOCO --- */
        function collectPoint(id) {
            if(state.visited.includes(id)) return;
            const p = DB.points.find(x => x.id === id);
            state.xp += p.xp;
            state.visited.push(id);
            
            // Logica Badge
            if(p.badge && !state.badges.includes(p.badge)) {
                state.badges.push(p.badge);
                toast(`BADGE SBLOCCATO: ${p.badge}!`);
            }
            
            // Controllo Master Hunter
            if(state.xp >= 5000 && !state.badges.includes("Master Hunter")) {
                state.badges.push("Master Hunter");
                toast("SEI UN MASTER HUNTER! 👑");
            }

            save();
            updateUI();
            renderPoints();
            renderProfile();
            toast(`+${p.xp} XP!`);
        }

        function redeemCoupon(cost, name) {
            if(state.xp < cost) return toast("XP insufficienti!");
            state.xp -= cost;
            save();
            updateUI();
            renderShop();
            toast(`RISCATTATO: ${name}`);
        }

        /* --- UTILS --- */
        function changeLang() {
            state.lang = state.lang === 'it' ? 'en' : 'it';
            document.getElementById('lang-btn').innerText = state.lang.toUpperCase();
            save();
            renderPoints();
            renderTours();
            updateUI();
        }

        function updateUI() {
            document.getElementById('total-xp').innerText = `${state.xp} XP`;
            const rank = state.xp > 2000 ? "Ape Regina" : state.xp > 500 ? "Esploratore" : "Larva";
            document.getElementById('rank-name').innerText = rank;
            
            document.querySelectorAll('[data-it]').forEach(el => {
                el.innerText = state.lang === 'it' ? el.getAttribute('data-it') : el.getAttribute('data-en');
            });
        }

        function toast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.style.display = 'block';
            t.className = 'animate__animated animate__fadeInDown';
            setTimeout(() => {
                t.className = 'animate__animated animate__fadeOutUp';
                setTimeout(() => t.style.display = 'none', 500);
            }, 2500);
        }

        function nav(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
            if(pageId === 'home') setTimeout(() => map.invalidateSize(), 200);
        }

        function save() { localStorage.setItem('beehunter_v4', JSON.stringify(state)); }

        window.onload = init;
    </script>
</body>
</html>
