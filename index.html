<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeeHunter Bari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; }
        .active { display: block !important; }
    </style>
</head>
<body class="bg-gray-50 pb-24 text-slate-900">

    <header class="bg-white p-5 shadow-sm sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-black text-yellow-500">BEEHUNTER 🐝</h1>
        <div class="bg-yellow-400 text-white px-4 py-1 rounded-full font-bold">150 pt</div>
    </header>

    <div id="home" class="page active p-5 space-y-4">
        <h2 class="text-2xl font-black italic mb-4">Sfide Vicine</h2>
        
        <div onclick="openPop('barca')" class="bg-white p-5 rounded-3xl shadow-md border-b-4 border-blue-500 active:scale-95 transition-transform cursor-pointer">
            <span class="text-[10px] font-bold bg-blue-100 text-blue-600 px-2 py-1 rounded">MARE</span>
            <h3 class="text-lg font-black mt-2 uppercase">Tour in Barca</h3>
            <p class="text-xs text-gray-400">Clicca per i dettagli e premi</p>
        </div>

        <div onclick="openPop('pasta')" class="bg-white p-5 rounded-3xl shadow-md border-b-4 border-yellow-500 active:scale-95 transition-transform cursor-pointer">
            <span class="text-[10px] font-bold bg-yellow-100 text-yellow-600 px-2 py-1 rounded">CIBO</span>
            <h3 class="text-lg font-black mt-2 uppercase">Mani in Pasta</h3>
            <p class="text-xs text-gray-400">Clicca per i dettagli e premi</p>
        </div>
    </div>

    <div id="shop" class="page p-5">
        <h2 class="text-2xl font-black mb-4 italic">Negozio Premi 🎁</h2>
        <div class="space-y-4">
            <div onclick="alert('Hai ottenuto lo Sconto Pizzeria! Mostra il codice: BEE10')" class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border-l-4 border-red-500 cursor-pointer">
                <div><p class="font-bold uppercase text-sm">Sconto 10% Pizzeria</p><p class="text-[10px] text-gray-400 italic font-bold">COSTO: 50 PUNTI</p></div>
                <span class="text-xl">🍕</span>
            </div>
            <div onclick="alert('Hai ottenuto il Gelato Omaggio! Mostra il codice: GELO-BEE')" class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border-l-4 border-blue-400 cursor-pointer">
                <div><p class="font-bold uppercase text-sm">Gelato Omaggio</p><p class="text-[10px] text-gray-400 italic font-bold">COSTO: 80 PUNTI</p></div>
                <span class="text-xl">🍦</span>
            </div>
        </div>
    </div>

    <div id="details" class="page p-5">
        <button onclick="nav('home')" class="text-gray-400 font-bold mb-4 uppercase text-xs">← Torna alle sfide</button>
        <div class="bg-white p-8 rounded-[40px] shadow-2xl border border-gray-100 text-center">
            <div id="det-icon" class="text-6xl mb-4 text-center">🚢</div>
            <h3 id="det-title" class="text-2xl font-black mb-4 italic uppercase">TITOLO</h3>
            <p id="det-desc" class="text-gray-500 mb-8 text-sm leading-relaxed text-center italic">Descrizione</p>
            <button onclick="alert('Scanner Fotocamera Attivato!')" class="w-full bg-black text-white py-4 rounded-2xl font-bold uppercase tracking-widest text-xs">Apri Scanner</button>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-white border-t p-4 flex justify-around items-center z-50 shadow-xl">
        <button onclick="nav('home')" class="flex flex-col items-center text-yellow-500 font-black">🏠<span class="text-[9px]">HOME</span></button>
        <button onclick="alert('Mappa in caricamento...')" class="flex flex-col items-center text-gray-300 font-black">📍<span class="text-[9px]">MAPPA</span></button>
        <button onclick="nav('shop')" class="flex flex-col items-center text-gray-300 font-black">🎁<span class="text-[9px]">PREMI</span></button>
    </nav>

    <script>
        // Funzione per cambiare pagina
        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        // Funzione per aprire i dettagli della sfida
        function openPop(tipo) {
            if(tipo === 'barca') {
                document.getElementById('det-title').innerText = "Tour in Barca";
                document.getElementById('det-icon').innerText = "🚢";
                document.getElementById('det-desc').innerText = "Trova il QR Code blu al molo di San Nicola per vincere il badge Capitano!";
            } else {
                document.getElementById('det-title').innerText = "Mani in Pasta";
                document.getElementById('det-icon').innerText = "🍝";
                document.getElementById('det-desc').innerText = "Fai le orecchiette a Bari Vecchia e scansiona il codice della nonna!";
            }
            nav('details');
        }
    </script>
</body>
</html>
