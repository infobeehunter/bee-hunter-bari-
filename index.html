<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>BEEHUNTER BARI & PROVINCIA | TOURIST ECOSYSTEM</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
/* BASE STYLES */
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');
:root { --primary: #FACC15; --primary-dark:#CA8A04; --secondary:#6366F1; --dark:#0F172A; --dark-soft:#1E293B; --bg-light:#F8FAFC; --white:#FFFFFF; --danger:#EF4444; --success:#22C55E; --border:rgba(15,23,42,0.08); --shadow-sm:0 4px 6px -1px rgba(0,0,0,0.1); --shadow-lg:0 20px 25px -5px rgba(0,0,0,0.1),0 10px 10px -5px rgba(0,0,0,0.04); --safe-area-inset-bottom:env(safe-area-inset-bottom); }
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box;scroll-behavior:smooth;}
body{font-family:'Outfit',sans-serif;background:var(--bg-light);color:var(--dark);margin:0;padding:0;height:100vh;overflow:hidden;}
.font-black{font-family:'Archivo Black',sans-serif;text-transform:uppercase;}
.font-code{font-family:'JetBrains Mono',monospace;}
.app-viewport{height:100vh;overflow-y:auto;padding-top:90px;padding-bottom:140px;-webkit-overflow-scrolling:touch;}
.app-viewport::-webkit-scrollbar{display:none;}
header.main-header{position:fixed;top:0;left:0;right:0;height:85px;background:rgba(255,255,255,0.85);backdrop-filter:blur(20px);z-index:9000;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;padding-top:env(safe-area-inset-top);}
nav.bottom-nav{position:fixed;bottom:30px;left:24px;right:24px;height:78px;background:var(--dark);border-radius:30px;z-index:9000;display:flex;align-items:center;justify-content:space-around;box-shadow:0 25px 50px -12px rgba(0,0,0,0.4);padding:0 12px;}
.nav-link{display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,0.4);text-decoration:none;transition:0.3s;width:55px;height:55px;border-radius:20px;}
.nav-link.active{color:var(--primary);background:rgba(255,255,255,0.05);}
.nav-link i{font-size:1.4rem;}
.hunter-card{background:var(--white);border-radius:35px;border:1px solid var(--border);margin-bottom:24px;padding:24px;transition:0.4s;position:relative;box-shadow:var(--shadow-sm);overflow:hidden;}
.hunter-card:active{transform:scale(0.98);}
.image-container{border-radius:28px;overflow:hidden;position:relative;margin-bottom:18px;}
.btn-action{width:100%;padding:22px;border-radius:24px;font-weight:800;font-size:0.85rem;text-transform:uppercase;letter-spacing:1px;transition:0.3s;display:flex;align-items:center;justify-content:center;gap:12px;border:none;cursor:pointer;}
.btn-dark{background:var(--dark);color:var(--white);}
.btn-primary{background:var(--primary);color:var(--dark);}
.btn-outline{background:transparent;border:2.5px solid var(--dark);color:var(--dark);}
.badge{padding:6px 14px;border-radius:12px;font-size:0.65rem;font-weight:900;text-transform:uppercase;letter-spacing:0.5px;}
.badge-yellow{background:var(--primary);color:var(--dark);}
.badge-dark{background:var(--dark);color:var(--white);}
#map-view{height:480px;width:100%;border-radius:45px;border:10px solid var(--white);box-shadow:var(--shadow-lg);z-index:10;margin-bottom:24px;}
.profile-hero{height:280px;background:linear-gradient(135deg,var(--dark) 0%,var(--dark-soft) 100%);border-radius:0 0 60px 60px;position:relative;width:100%;}
.profile-avatar-container{position:absolute;bottom:-70px;left:50%;transform:translateX(-50%);z-index:100;}
.avatar-main{width:140px;height:140px;border-radius:50px;border:8px solid var(--bg-light);object-fit:cover;background:white;shadow:var(--shadow-lg);}
.page{display:none;animation:fadeInApp 0.5s ease;}
.page.active{display:block;}
@keyframes fadeInApp{from{opacity:0;transform:translateY(15px);}to{opacity:1;transform:translateY(0);}}
.icon-btn{flex:1;padding:15px;border-radius:18px;background:#F1F5F9;color:var(--dark);display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:0.2s;}
.icon-btn:active{background:#E2E8F0;}
.text-huge{font-size:2.4rem;line-height:1;}
.text-tiny{font-size:0.7rem;font-weight:700;text-transform:uppercase;}
.glass-panel{background:rgba(255,255,255,0.7);backdrop-filter:blur(10px);}
.star-rating{color:#fbbf24;font-size:0.8rem;display:flex;gap:2px;}
.ticket-cut{position:relative;border-left:8px solid var(--primary);}
.ticket-cut::before,.ticket-cut::after{content:'';position:absolute;left:-14px;width:20px;height:20px;background:var(--bg-light);border-radius:50%;}
.ticket-cut::before{top:-10px;}
.ticket-cut::after{bottom:-10px;}
</style>
</head>
<body>
<header class="main-header">
<!-- HEADER CODE -->
</header>
<nav class="bottom-nav">
<!-- NAVIGATION ICONS -->
</nav>
<div class="app-viewport">
<!-- ALL PAGES (RADAR, PARTNERS, BOOKING, RANK, PROFILE, SCANNER) -->
</div>
<div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 z-[10000] bg-dark text-white px-8 py-4 rounded-3xl text-[10px] font-black uppercase tracking-widest opacity-0 transition-all pointer-events-none shadow-2xl">---</div>

<script>
/* --- DATABASE POINTS --- */
const DB={missions:[],partners:[],leaderboard:[]};
/* --- STATE --- */
let state=JSON.parse(localStorage.getItem('beehunter_enterprise_v3'))||{user:{name:"Hunter_"+Math.floor(100+Math.random()*900),avatar:"https://api.dicebear.com/7.x/avataaars/svg?seed=BariHunter",bio:"Esploro Bari e provincia un passo alla volta.",interests:["Street Food","Storia","Mare"]},xp:0,visited:[],tickets:[],rank:12};
let map,currentTarget,stream;

/* --- INIT APP --- */
function init(){renderUI();initMap();renderMissions();renderPartners();renderTickets();renderLeaderboard();}
function save(){localStorage.setItem('beehunter_enterprise_v3',JSON.stringify(state));renderUI();}
function renderUI(){document.getElementById('header-xp').innerText=state.xp+" XP";document.getElementById('header-avatar').src=state.user.avatar;document.getElementById('p-username').innerText=state.user.name;document.getElementById('p-avatar-img').src=state.user.avatar;document.getElementById('p-xp').innerText=state.xp;document.getElementById('p-visits').innerText=state.visited.length;document.getElementById('p-bio-input').value=state.user.bio;const intWrap=document.getElementById('p-interests');intWrap.innerHTML=state.user.interests.map(i=>`<span class="bg-slate-100 text-[10px] font-black px-4 py-2 rounded-xl text-slate-800">#${i}</span>`).join('');}
function nav(pageId){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));document.getElementById(pageId).classList.add('active');document.getElementById('nav-'+pageId).classList.add('active');if(pageId==='radar'&&map)setTimeout(()=>map.invalidateSize(),200);if(pageId==='scanner')startCamera();else stopCamera();window.scrollTo(0,0);}

/* --- MAP & MISSIONS --- */
function initMap(){if(map)return;map=L.map('map-view',{zoomControl:false}).setView([41.130,16.870],12);L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);DB.missions.forEach(m=>{const marker=L.marker(m.coords).addTo(map);marker.on('click',()=>{currentTarget=m;document.getElementById('scan-target-name').innerText=m.name;nav('scanner');});});}
function renderMissions(){const list=document.getElementById('mission-list');list.innerHTML=DB.missions.map(m=>`<div class="hunter-card flex items-center gap-5 ${state.visited.includes(m.id)?'opacity-50':''}" onclick="selectMission('${m.id}')"><div class="w-16 h-16 rounded-2xl bg-cover bg-center" style="background-image:url(${m.img})"></div><div class="flex-1"><h4 class="font-black italic text-sm">${m.name}</h4><p class="text-[9px] font-black text-yellow-600 uppercase">+${m.xp} XP</p></div>${state.visited.includes(m.id)?'<i class="fa-solid fa-circle-check text-green-500"></i>':'<i class="fa-solid fa-chevron-right text-slate-200"></i>'}</div>`).join('');}
function selectMission(id){const m=DB.missions.find(x=>x.id===id);currentTarget=m;document.getElementById('scan-target-name').innerText=m.name;nav('scanner');}

/* --- CAMERA --- */
async function startCamera(){try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});document.getElementById('video-stream').srcObject=stream;}catch(e){showToast("Accesso camera negato!");nav('radar');}}
function stopCamera(){if(stream)stream.getTracks().forEach(t=>t.stop());}
function validateMission(){if(state.visited.includes(currentTarget.id)){showToast("Hai già convalidato questo luogo!");nav('radar');return;}state.xp+=currentTarget.xp;state.visited.push(currentTarget.id);save();showToast("Missione Compiuta! +"+currentTarget.xp+" XP");renderMissions();nav('radar');}

/* --- TOAST --- */
function showToast(msg){const t=document.getElementById('toast');t.innerText=msg;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',3000);}

/* --- INIT --- */
window.onload=init;
</script>
</body>
</html>
